<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poke API</title>
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/script.js" defer type="module"></script>
  </head>
  <body>
    <header class="header">
      <label for="generation-select">Choisissez une génération :</label>
      <select id="generation-select">
        <option value="1">nom</option>
        <option value="2">Point de Vie</option>
        <option value="3">Attaque</option>
        <option value="4">Type</option>
        <option value="5">Attaque Spéciale</option>
        <option value="6">Défense</option>
        <option value="7">Vitesse</option>
      </select>
      <p>Choisissez un ou plusieurs types :</p>
      <div class="type-buttons">
        <button class="type-btn active" data-type="all">Tous</button>
        <button class="type-btn" data-type="grass">Plante</button>
        <button class="type-btn" data-type="fire">Feu</button>
        <button class="type-btn" data-type="water">Eau</button>
        <button class="type-btn" data-type="poison">Poison</button>
        <button class="type-btn" data-type="electric">Électrik</button>
        <button class="type-btn" data-type="fairy">Fée</button>
        <button class="type-btn" data-type="flying">Vol</button>
        <button class="type-btn" data-type="bug">Insecte</button>
        <button class="type-btn" data-type="ground">Sol</button>
        <button class="type-btn" data-type="fighting">Combat</button>
        <button class="type-btn" data-type="psychic">Psy</button>
        <button class="type-btn" data-type="steel">Acier</button>
        <button class="type-btn" data-type="rock">Roche</button>
        <button class="type-btn" data-type="dark">Ténèbres</button>
        <button class="type-btn" data-type="ghost">Spectre</button>
        <button class="type-btn" data-type="ice">Glace</button>
        <button class="type-btn" data-type="dragon">Dragon</button>
        <button class="type-btn" data-type="normal">Normal</button>
      </div>
    </header>
    <main>
    </main>
  </body>
</html>
